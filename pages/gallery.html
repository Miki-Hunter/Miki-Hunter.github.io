<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fly2Sun 星空画廊 — 深空天体图鉴，星云、星系、星团详情">
    <title>星空画廊 | Fly2Sun.eu.org</title>
    <link rel="stylesheet" href="../css/style.css?v=2">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }
        .g-card {
            position: relative;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
        }
        .g-card:hover {
            border-color: var(--border-h);
            transform: translateY(-5px);
            box-shadow: 0 12px 44px rgba(0,180,255,0.1);
        }
        .g-card .gc-visual {
            width: 100%; height: 200px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }
        .g-card .gc-visual::after {
            content: '';
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg-panel), transparent);
            pointer-events: none; z-index: 2;
        }
        .g-card .gc-visual .click-hint {
            position: absolute; top: 14px; right: 16px;
            font-size: 0.7rem; color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.45);
            padding: 3px 10px; border-radius: 12px;
            letter-spacing: 0.06em;
            z-index: 2; opacity: 0;
            transition: opacity 0.3s;
        }
        .g-card:hover .gc-visual .click-hint { opacity: 1; }
        .g-card .gc-body {
            padding: 18px 20px 22px;
        }
        .g-card .gc-body h3 {
            font-size: 1.1rem; letter-spacing: 0.06em;
            color: #fff; margin-bottom: 4px;
        }
        .g-card .gc-body .cat {
            font-size: 0.72rem; color: var(--cyan);
            letter-spacing: 0.1em; margin-bottom: 10px;
        }
        .g-card .gc-body p {
            font-size: 0.82rem; color: var(--text-dim);
            line-height: 1.6;
        }
        .g-card .gc-stats {
            display: flex; gap: 16px;
            margin-top: 12px;
            font-size: 0.72rem; color: var(--text-muted);
        }

        /* Nebula BGs */
        .bg-orion     { background: radial-gradient(ellipse at 40% 40%, #3a1848, #120a20 60%, #050510); }
        .bg-eagle     { background: radial-gradient(ellipse at 45% 35%, #1a3050, #0a1020 55%, #050510); }
        .bg-crab      { background: radial-gradient(ellipse at 40% 40%, #4a2028, #180a10 60%, #050510); }
        .bg-ring      { background: radial-gradient(ellipse at 45% 45%, #1a3050, #0a0a20 55%, #050510); }
        .bg-andromeda { background: radial-gradient(ellipse at 40% 35%, #1a2a50, #0a0a20 65%, #050510); }
        .bg-whirlpool { background: radial-gradient(ellipse at 40% 40%, #281850, #0e081e 60%, #050510); }
        .bg-pleiades  { background: radial-gradient(ellipse at 40% 35%, #1a2a55, #0a0a25 60%, #050510); }
        .bg-horsehead { background: radial-gradient(ellipse at 40% 45%, #2a1018, #0c0510 60%, #050510); }
        .bg-sombrero  { background: radial-gradient(ellipse at 40% 40%, #1a2038, #0a0a18 65%, #050510); }
        .bg-carina    { background: radial-gradient(ellipse at 45% 35%, #3a1a38, #120a1a 55%, #050510); }
        .bg-veil      { background: radial-gradient(ellipse at 40% 40%, #1a2a40, #080a18 60%, #050510); }
        .bg-catseye   { background: radial-gradient(ellipse at 40% 40%, #1a2a50, #080a22 55%, #050510); }

        /* ===== MODAL OVERLAY ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(3,3,15,0.94);
            display: flex; align-items: flex-start; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.open {
            opacity: 1; pointer-events: auto;
        }
        .modal-panel {
            background: rgba(8,18,40,0.98);
            border: 1px solid rgba(0,220,255,0.25);
            border-radius: 14px;
            width: 100%; max-width: 700px;
            margin: auto;
            position: relative;
        }
        .modal-panel .m-visual {
            width: 100%; aspect-ratio: 4/3;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem;
            border-radius: 14px 14px 0 0;
            position: relative;
            overflow: hidden;
            background: #020810;
        }
        .modal-panel .m-visual .m-emoji {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; z-index: 0;
        }
        .modal-panel .m-visual img {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            object-fit: contain;
        }
        .modal-panel .m-close {
            position: absolute; top: 14px; right: 16px;
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 5;
            transition: all 0.25s;
        }
        .modal-panel .m-close:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--cyan);
        }
        .modal-panel .m-body {
            padding: 28px 28px 34px;
        }
        .modal-panel .m-body h2 {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            letter-spacing: 0.08em; color: #fff;
            margin-bottom: 2px;
        }
        .modal-panel .m-body .m-sub {
            font-size: 0.82rem; color: var(--cyan);
            letter-spacing: 0.08em; margin-bottom: 16px;
        }
        .modal-panel .m-body .m-desc {
            font-size: 0.92rem; line-height: 1.8;
            color: var(--text); margin-bottom: 18px;
        }
        .modal-panel .m-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .modal-panel .m-stats .ms {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 7px; padding: 12px 14px;
            text-align: center;
        }
        .modal-panel .m-stats .ms .msv {
            font-size: 1.05rem; font-weight: 700;
            color: var(--cyan); letter-spacing: 0.03em;
        }
        .modal-panel .m-stats .ms .msl {
            font-size: 0.68rem; color: var(--text-dim);
            margin-top: 3px;
        }
        .modal-panel .m-funfact {
            background: rgba(0,200,255,0.04);
            border-left: 2px solid var(--cyan);
            padding: 16px 20px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.86rem; color: var(--text);
            line-height: 1.7; margin-bottom: 18px;
        }
        .modal-panel .m-funfact strong { color: var(--cyan); }
        .modal-panel .m-observe {
            font-size: 0.84rem; color: var(--text-dim);
            line-height: 1.7; margin-bottom: 16px;
            padding: 14px 18px;
            background: rgba(255,255,255,0.015);
            border-radius: var(--radius-sm);
        }
        .modal-panel .m-observe strong { color: #fff; }
        .modal-panel .m-links {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .modal-panel .m-links a {
            font-size: 0.78rem; padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.25s;
        }
        .modal-panel .m-links a:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0,200,255,0.06);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .modal-overlay { padding: 0; }
            .modal-panel {
                border-radius: 16px;
                max-width: calc(100% - 16px);
                margin: 16px auto;
            }
            .modal-panel .m-visual { aspect-ratio: 4/3; border-radius: 16px 16px 0 0; }
            .modal-panel .m-body { padding: 18px 14px 24px; }
            .modal-panel .m-stats { grid-template-columns: repeat(2, 1fr); }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
    // ==================== CELESTIAL OBJECT DATA ====================
    const objects = [
        {
            id: 'orion',
            name: '猎户座大星云',
            nameEn: 'Orion Nebula · M42 · NGC 1976',
            type: '发射星云', typeEn: 'Emission Nebula',
            icon: '💫', image: '../images/orion.jpg', credit: 'NASA, ESA, M. Robberto (STScI/ESA)', bg: 'bg-orion',
            descEn: 'The closest massive star-forming region to Earth and the brightest diffuse nebula in the sky. Visible to the naked eye as a fuzzy patch in Orion\'s sword, it harbors about 700 infant stars with protoplanetary disks.', desc: '猎户座大星云是距离地球最近的恒星形成区域之一，也是全天最明亮的弥漫星云。它位于猎户座"宝剑"位置，肉眼即可见为一个模糊的光斑。哈勃空间望远镜在此拍摄了大量经典影像，揭示了正在形成的原恒星和原行星盘。星云中心有一个名为"猎户座四边形星团"的年轻疏散星团，其强烈的紫外辐射电离了周围气体，使星云发光。',
            funFactEn: 'The Orion Nebula\'s core harbors ~700 infant stars, many with protoplanetary disks that may one day form new planetary systems.', funFact: '猎户座大星云的核心区域包含约 700 颗正在形成的恒星，其中一些带有原行星盘——未来可能诞生新的行星系统。',
            stats: [
                {zh:'1,344 光年', en:'1,344 ly', labelZh:'距离', labelEn:'Distance'},
                {zh:'猎户座', en:'Orion', labelZh:'星座', labelEn:'Constellation'},
                {zh:'+4.0', en:'+4.0', labelZh:'视星等', labelEn:'Apparent Mag.'},
                {zh:'65×60 角分', en:'65×60 arcmin', labelZh:'视大小', labelEn:'Apparent Size'},
                {zh:'~300,000 年', en:'~300,000 yr', labelZh:'年龄', labelEn:'Age'},
                {zh:'约 24 光年', en:'~24 ly', labelZh:'直径', labelEn:'Diameter'},
            ],
            observeEn: 'Best viewed in winter (Dec–Feb in N. hemisphere). Visible to the naked eye as a fuzzy patch below Orion\'s belt. A 7×50 binocular reveals the nebula structure and Trapezium Cluster.', observe: '冬季观测最佳（北半球 12月-2月）。肉眼可见为猎户座腰帶下方三颗星中间的模糊光斑。用 7×50 双筒望远镜即可看到星云结构和四边形星团。',
            links: [
                ['Hubble M42 Gallery', 'https://hubblesite.org/contents/media/images/2006/01/1826-Image.html'],
                ['ESO M42', 'https://www.eso.org/public/images/eso1103a/'],
            ],
        },
        {
            id: 'eagle',
            name: '鹰状星云',
            nameEn: 'Eagle Nebula · M16 · NGC 6611',
            type: '发射星云 + 疏散星团', typeEn: 'Emission Nebula + Open Cluster',
            icon: '🦅', image: '../images/eagle.jpg', credit: 'NASA, ESA, Hubble Heritage Team', bg: 'bg-eagle',
            descEn: 'Home to the iconic Pillars of Creation — three towering columns of interstellar gas and dust where new stars are being born. Hubble\'s 1995 image became one of the most famous astronomical photographs in history.', desc: '鹰状星云因其形似展翅的雄鹰而得名，但更著名的是其中的"创生之柱"（Pillars of Creation）——三个巨大的星际气体和尘埃柱，内部正在孕育新的恒星。1995 年哈勃拍摄的创生之柱照片成为人类历史上最具标志性的天文影像之一。2015 年和 2022 年，哈勃与韦伯分别以更高分辨率和红外波段重新拍摄了这一经典目标。',
            funFactEn: 'The Pillars of Creation stand 4–5 light-years tall. The middle pillar alone spans the distance from the Sun to Proxima Centauri. The entire nebula stretches over 70 light-years.', funFact: '创生之柱的高度约为 4-5 光年——仅中间那根柱子就可以从太阳延伸到比邻星（最近的恒星）。而整个鹰状星云的跨度超过 70 光年。',
            stats: [
                {zh:'~7,000 光年', en:'~7,000 ly', labelZh:'距离', labelEn:'Distance'},
                {zh:'巨蛇座', en:'Serpens', labelZh:'星座', labelEn:'Constellation'},
                {zh:'+6.0', en:'+6.0', labelZh:'视星等', labelEn:'Apparent Mag.'},
                {zh:'70×55 光年', en:'70×55 ly', labelZh:'直径', labelEn:'Diameter'},
                {zh:'~550 万 年', en:'~5.5 million yr', labelZh:'年龄', labelEn:'Age'},
                {zh:'1745 年', en:'1745', labelZh:'发现年份', labelEn:'Discovered'},
            ],
            observeEn: 'Best in summer. Requires an 8-inch+ telescope for detail. Under very dark skies, a 4-inch scope can reveal the nebula outline.', observe: '夏季观测最佳。需要较大口径望远镜（8英寸以上）才能看到细节。在极暗的天空下，用 4 英寸望远镜可见星云轮廓。创生之柱需要大口径 + 良好视宁度才能分辨。',
            links: [
                ['Hubble Pillars 2015', 'https://hubblesite.org/contents/media/images/2015/01/3470-Image.html'],
                ['Webb Pillars 2022', 'https://webbtelescope.org/contents/media/images/2022/053/01GFB4FM086001CKPDT1PBM39R'],
            ],
        },
        {
            id: 'crab',
            name: '蟹状星云',
            nameEn: 'Crab Nebula · M1 · NGC 1952',
            type: '超新星遗迹', typeEn: 'Supernova Remnant',
            icon: '🦀', image: '../images/crab.jpg', credit: 'NASA, ESA, J. Hester, A. Loll (ASU)', bg: 'bg-crab',
            descEn: 'The expanding remnant of supernova SN 1054, meticulously recorded by Chinese astronomers as a "guest star" visible in daylight for 23 days. At its heart spins a neutron star rotating 30 times per second.', desc: '蟹状星云是公元 1054 年超新星爆发（SN 1054）的遗迹。这次爆发被中国宋代天文学家详细记录为"客星"——白天可见达 23 天，夜间可见近两年。星云中心有一颗高速旋转的中子星（脉冲星），每秒自转约 30 次，是强大的 X 射线和伽马射线源。蟹状星云是现代天文学中研究最多的天体之一。',
            funFactEn: 'The central pulsar is only ~28–30 km across — roughly the size of a city — yet contains 1.4 solar masses. A teaspoon of its material would weigh billions of tons.', funFact: '蟹状星云中心的脉冲星直径仅约 28-30 公里（和一座城市差不多大），但质量是太阳的 1.4 倍——它的物质密度极高，一茶匙的物质重达数十亿吨。',
            stats: [
                {zh:'6,500 光年', en:'6,500 ly', labelZh:'距离', labelEn:'Distance'},
                {zh:'金牛座', en:'Taurus', labelZh:'星座', labelEn:'Constellation'},
                {zh:'+8.4', en:'+8.4', labelZh:'视星等', labelEn:'Apparent Mag.'},
                {zh:'11×7 光年', en:'11×7 ly', labelZh:'直径', labelEn:'Diameter'},
                {zh:'~970 年', en:'~970 yr', labelZh:'爆发至今', labelEn:'Since Explosion'},
                {zh:'1731 年', en:'1731', labelZh:'发现年份', labelEn:'Discovered'},
            ],
            observeEn: 'Best in winter. A 4-inch telescope reveals an oval smudge under moderately dark skies. 16-inch+ scopes hint at filamentary structure.', observe: '冬季观测最佳。在光污染较小的环境下，用 4 英寸望远镜可见椭圆形模糊光斑。16 英寸以上望远镜可隐约看到丝状结构。脉冲星本身仅可通过 X 射线/射电望远镜探测。',
            links: [
                ['Chandra X-ray M1', 'https://chandra.harvard.edu/photo/2002/0052/'],
                ['Hubble M1', 'https://hubblesite.org/contents/media/images/2005/37/1825-Image.html'],
            ],
        },
        {
            id: 'ring',
            name: '环状星云',
            nameEn: 'Ring Nebula · M57 · NGC 6720',
            type: '行星状星云', typeEn: 'Planetary Nebula',
            icon: '💍', image: '../images/ring.jpg', credit: 'NASA, ESA, CSA, JWST Ring Nebula Team', bg: 'bg-ring',
            descEn: 'The glowing remnant of a Sun-like star\'s death. As the star exhausted its fuel, it expelled its outer layers into space, forming concentric shells illuminated by the exposed white dwarf core — a preview of our Sun\'s fate in ~5 billion years.', desc: '环状星云是类太阳恒星死亡后的遗骸——当恒星耗尽了核心的氢燃料，外层气体被抛射到太空中，形成美丽的同心壳层结构。中心残留的白矮星温度极高，发出的紫外辐射使周围气体电离发光。环状星云展示了约 50 亿年后太阳可能的最终命运。2023 年韦伯望远镜的新影像揭示了前所未有的细节。',
            funFactEn: 'The term "planetary nebula" is a historical misnomer — they have nothing to do with planets. William Herschel thought they looked like planetary disks through his telescope.', funFact: '"行星状星云"是一个历史上的误称——它们与行星毫无关系。18 世纪的天文学家威廉·赫歇尔通过望远镜观察时，它们看起来像行星的圆面，因此得名。这个名字被沿用至今。',
            stats: [
                {zh:'~2,300 光年', en:'~2,300 ly', labelZh:'距离', labelEn:'Distance'},
                {zh:'天琴座', en:'Lyra', labelZh:'星座', labelEn:'Constellation'},
                {zh:'+8.8', en:'+8.8', labelZh:'视星等', labelEn:'Apparent Mag.'},
                {zh:'~1.3 光年', en:'~1.3 ly', labelZh:'直径', labelEn:'Diameter'},
                {zh:'~7,000 年', en:'~7,000 yr', labelZh:'年龄', labelEn:'Age'},
                {zh:'1779 年', en:'1779', labelZh:'发现年份', labelEn:'Discovered'},
            ],
            observeEn: 'Best in summer (Lyra is a summer constellation). A 3–4 inch scope shows a distinct smoke-ring shape. 8-inch+ reveals the central white dwarf (~15th mag).', observe: '夏季观测最佳（天琴座为夏季星座）。在小型望远镜（3-4 英寸）中可见明显的烟圈形状，像一个微小的甜甜圈。用 8 英寸以上望远镜在良好视宁度下可见中心的白矮星（约 15 等）。',
            links: [
                ['Webb M57 2023', 'https://webbtelescope.org/contents/media/images/2023/136/01HBBXE5K4EXEFHF10Y743E92N'],
                ['Hubble M57', 'https://hubblesite.org/contents/media/images/1999/01/762-Image.html'],
            ],
        },
        {
            id: 'andromeda',
            name: '仙女座星系',
            nameEn: 'Andromeda Galaxy · M31 · NGC 224',
            type: '螺旋星系 (SA(s)b)', typeEn: 'Spiral Galaxy (SA(s)b)',

                <p>${L(obj,'desc').slice(0, 90)}...</p>
                <div class="gc-stats">
                    ${obj.stats.slice(0,3).map(s => '<span><span lang="zh">'+s.zh+'</span><span lang="en">'+s.en+'</span></span>').join('')}
                </div>
            </div>
        `;
        card.addEventListener('click', () => openModal(obj));
        grid.appendChild(card);
    });
    // Re-apply translations for dynamically created lang spans
    if (window._applyTranslations) window._applyTranslations();

    // ==================== MODAL LOGIC ====================
    const overlay = document.getElementById('modalOverlay');
    const modalVisual = document.getElementById('modalVisual');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    function openModal(obj) {
        modalVisual.className = 'm-visual ' + obj.bg;
        modalVisual.innerHTML = '<div class="m-emoji">' + obj.icon + '</div>';
        var img = document.createElement('img');
        img.src = obj.image;
        img.alt = obj.name;
        img.onload = function() { this.style.opacity = '1'; };
        img.style.opacity = '0';
        img.style.transition = 'opacity 0.3s';
        modalVisual.appendChild(img);

        modalBody.innerHTML = `
            <h2>${L(obj,'name')}</h2>
            <p class="m-sub">${obj.nameEn}<br><span style="font-size:0.68rem;color:var(--text-muted);">Credit: ${obj.credit}</span><br>${L(obj,'type')}</p>
            <p class="m-desc">${L(obj,'desc')}</p>
            <div class="m-stats">
                ${obj.stats.map(s => `
                    <div class="ms">
                        <div class="msv"><span lang="zh">${s.zh}</span><span lang="en">${s.en}</span></div>
                        <div class="msl"><span lang="zh">${s.labelZh}</span><span lang="en">${s.labelEn}</span></div>
                    </div>
                `).join('')}
            </div>
            <div class="m-funfact"><strong>${_t('gallery.funfact')}：</strong>${L(obj,'funFact')}</div>
            <div class="m-observe"><strong>${_t('gallery.observe')}：</strong>${L(obj,'observe')}</div>
            <div class="m-links">
                <span style="font-size:0.78rem;color:var(--text-muted);margin-right:4px;"><span lang="zh">更多：</span><span lang="en">More:</span></span>
                ${obj.links.map(l => '<a href="'+l[1]+'" target="_blank" rel="noopener">'+l[0]+' <span style="font-size:0.7rem;">→</span></a>').join('')}
            </div>
        `;

        // Re-apply translations for dynamically created lang spans in modal
        if (window._applyTranslations) window._applyTranslations();

        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        modalVisual.parentElement.scrollTop = 0;

        // update URL hash
        history.replaceState(null, '', '#' + obj.id);
    }

    function closeModal() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        history.replaceState(null, '', window.location.pathname);
    }

    modalClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
    });

    // Open from URL hash on load
    const hash = window.location.hash.slice(1);
    if (hash) {
        const obj = objects.find(o => o.id === hash);
        if (obj) setTimeout(() => openModal(obj), 400);
    }
    </script>
</body>
</html>
